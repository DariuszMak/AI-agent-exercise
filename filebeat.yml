filebeat.inputs:
  - type: filestream
    id: app-log
    paths:
      - /shared-logs/app.log
    parsers:
      - ndjson:
          keys_under_root: true
          add_error_key: true
          message_key: event

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]

setup.kibana:
  host: "kibana:5601"
