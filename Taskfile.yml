version: "3"

env:
  UV_ENV_FILE: .dev.env

tasks:
  cleanup:
    desc: Full project cleanup (docker, git, ports, caches)
    cmds:
      - powershell -ExecutionPolicy Bypass -File tasks/cleanup.ps1

  dev-env:
    desc: Setup uv environment (Python, sync, lock)
    cmds:
      - powershell -ExecutionPolicy Bypass -File tasks/dev_uv_environment.ps1

  local-static-tests:
    desc: Static analysis + unit tests
    cmds:
      - powershell -ExecutionPolicy Bypass -File tasks/static_analysis_and_tests.ps1

  kibana-elastic:
    desc: Start Elastic + Kibana stack
    cmds:
      - powershell -ExecutionPolicy Bypass -File tasks/kibana_elastic.ps1

  sonarqube:
    desc: Run SonarQube analysis pipeline
    cmds:
      - powershell -ExecutionPolicy Bypass -File tasks/sonarqube.ps1

  generate-diagrams:
    desc: Generate project diagrams
    cmds:
      - powershell -ExecutionPolicy Bypass -File tasks/generate_diagrams.ps1

  local-dev-native-run:
    desc: Local dev Native run
    cmds:
      - powershell -ExecutionPolicy Bypass -File tasks/run_native_dev_application.ps1

  local-dev-native-api-tests:
    desc: Local dev Native API tests
    cmds:
      - powershell -ExecutionPolicy Bypass -File tasks/wait_for_api.ps1
      - powershell -ExecutionPolicy Bypass -File tasks/test_api.ps1

  full-dev-native:
    desc: Fast native Native development flow
    deps:
      - cleanup
    cmds:
      - task: dev-env
      - task: local-static-tests
      - task: kibana-elastic
      - task: local-dev-native-run
      - task: local-dev-native-api-tests

  full-static-analyzis:
    desc: Full static analysis + SonarQube + diagrams
    deps:
      - cleanup
    cmds:
      - task: dev-env
      - task: local-static-tests
      - task: sonarqube
      - task: generate-diagrams
